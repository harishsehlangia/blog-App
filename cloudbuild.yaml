steps:
  # Build the Docker image using server/ as the build context
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/notelys-backend:$COMMIT_SHA'
      - '-f'
      - 'server/Dockerfile'
      - 'server'   # <-- build context is the server/ directory

  # Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/notelys-backend:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'notelys-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/notelys-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'         # Change to your preferred region
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/notelys-backend:$COMMIT_SHA'
