steps:
  # ================= BACKEND =================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/backend:$COMMIT_SHA',
        '-f',
        'server/Dockerfile',
        'server'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/backend:$COMMIT_SHA'
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'notelys-api',
        '--image',
        'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/backend:$COMMIT_SHA',
        '--region',
        'us-central1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

  # ================= FRONTEND =================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',

        '--build-arg', 'VITE_SERVER_DOMAIN=https://notelys-api-770359912258.us-central1.run.app',

        '--build-arg', 'VITE_FIREBASE_API_KEY=AIzaSyAuc0gCiY_RYk20c5650WNhhurHLVPxk1c',
        '--build-arg', 'VITE_FIREBASE_AUTH_DOMAIN=blog-app-82817.firebaseapp.com',
        '--build-arg', 'VITE_FIREBASE_PROJECT_ID=blog-app-82817',
        '--build-arg', 'VITE_FIREBASE_STORAGE_BUCKET=blog-app-82817.firebasestorage.app',
        '--build-arg', 'VITE_FIREBASE_MESSAGING_SENDER_ID=19739873670',
        '--build-arg', 'VITE_FIREBASE_APP_ID=1:19739873670:web:7aa855e3e835cfb61b1c07',

        '-t',
        'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/frontend:latest',

        './frontend'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/frontend:latest'
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'notelys-web',
        '--image',
        'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/frontend:latest',
        '--region',
        'us-central1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/notelys/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY